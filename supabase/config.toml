# Webhooks are called by external services without a user session and are
# protected by a shared secret (x-webhook-secret), verified in-function.
[functions.taggbox-webhook]
verify_jwt = false

[functions.seed-review]
verify_jwt = false

[functions.submit-contact]
verify_jwt = false

[functions.submit-report]
verify_jwt = false

# Privileged functions validate the user's session and admin role inside the
# function with auth.getUser(). Gateway JWT verification is disabled on selected
# external-backend admin tools so legacy sessions are not rejected before our
# code can validate them.
[functions.moderate-content]
verify_jwt = true

[functions.enrich-property]
verify_jwt = true

[functions.scrape-properties]
verify_jwt = true

[functions.estimate-scrape]
verify_jwt = true

[functions.estimate-scrape-radius]
verify_jwt = true

[functions.delete-properties]
verify_jwt = true

[functions.import-csv-properties]
verify_jwt = true

[functions.import-apify-channels]
verify_jwt = true

[functions.send-email]
verify_jwt = true

# Read-only YouTube previews accept the public publishable key. Any database
# write mode still validates the caller and admin role inside the function.
[functions.youtube-import]
verify_jwt = false

[functions.youtube-bulk-seed]
verify_jwt = false

[functions.link-videos-to-properties]
verify_jwt = false

[functions.fetch-google-reviews]
verify_jwt = false

# Creator Channels — validate user + admin role inside the function.
[functions.youtube-verify-channel]
verify_jwt = false

[functions.verify-creator-channel]
verify_jwt = false

[functions.submit-creator-video]
verify_jwt = false

[functions.approve-creator-submission]
verify_jwt = false

[functions.generate-video-summary]
verify_jwt = false

[functions.admin-analytics]
verify_jwt = false

# Public OG image for link-unfurl previews.
[functions.og-image]
verify_jwt = false

# Public sitemap for SEO.
[functions.sitemap]
verify_jwt = false

# Public: called before user has a session (signup/signin captcha).
[functions.verify-turnstile]
verify_jwt = false
